<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <title>Les bonnes pièces - vente de pièces autos</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="shortcut icon" href="icons/logo-les-bonnes-pieces.png" type="image/x-icon">
        <script type="module" src="js/articles.js"></script>
    </head>

    <body>
        <header class="header">
            <div class="header-icon">
                <a href="index.html">
                    <img src="icons/logo-les-bonnes-pieces.png" width="250" alt="website's icon">
                </a>
            </div>

            <nav class="navbar">
                <ul class="navbar-nav">
                    <li class="nav-item"><a href="index.html" class="nav-link active">Accueil</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Catalogue</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </header><br><br>

        <main>
            <section class="filter-section">
                <h1>Filtre</h1>
                <a href="#" id="btn-filter1">Optiques</a><br><br>
                <a href="#" id="btn-filter2">Freinage</a><br><br>
                <a href="#" id="btn-sort1">Prix croissant</a><br><br>
                <a href="#" id="btn-sort2">Prix décroissant</a><br><br>

                <h2>Envoyer un avis</h2>
                <form>
                    <label for="piece-id">Identifiant de la pièce :</label><br>
                    <input type="number" name="piece-id" id="piece-id" required><br><br>

                    <label for="username">Nom d'utilisateur :</label><br>
                    <input type="text" name="username" id="username" required><br><br>

                    <label for="opinions">Avis :</label><br>
                    <textarea name="opinions" rows="5" id="opinions" required></textarea><br><br>

                    <button type="submit">Envoyer</button>
                </form>
            </section>

            <section class="articles-section">
            </section>
        </main><br><br>

        <footer class="footer">
            <p class="footer-text">Les bonnes pièces 2026 Tous droits reservés.</p>
        </footer>
    </body>
</html>
