<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Les bonnes pièces - site web de vente d'articles</title>
        <link rel="stylesheet" href="css/style.css">
        <script type="module" src="js/articles.js"></script>
    </head>

    <body>
        <header class="header">
             <div class="header-icon">
               <a href="index.html"> <img src="icons/logo-les-bonnes-pieces.png" width="250" alt="website's icon"></a>
             </div>

             <h1 class="header-title">Les bonnes pièces</h1>
        </header><br><br>

        <main>
            <section class="section-filter">
                  <h1>Filtrer</h1>

                  <button id="btn-sort1" class="btn">Prix croissant</button><br><br>
                  <button id="btn-sort2" class="btn">Prix décroissant</button><br><br>
                  <button class="btn" id="btn-filter1">Optiques</button><br><br>
                  <button class="btn" id="btn-filter2">Freinage</button><br><br><br>

                  <label for="max-price">Prix maximum :</label><br>
                  <input type="range" name="max-price" id="max-price" min="0" max="60" step="5"><br><br><br>

                  <h2>Envoyer vos avis</h2>
                  <form method="post" class="form">
                       <div class="form-section">
                           <label for="article-id">Identifiant de la pièce :</label><br>
                           <input type="number" name="article-id" id="article-id" required>
                       </div><br>

                       <div class="form-section">
                            <label for="username">Nom d'utilisateur :</label><br>
                            <input type="text" name="username" id="username" required>
                       </div><br>

                       <div class="form-section">
                           <label for="user-opinion">Avis :</label><br>
                           <textarea name="user-opinion" id="user-opinion" required cols="30" rows="10"></textarea>
                       </div><br>
                       
                       <div class="form-section">
                           <button type="submit" class="btn">Envoyer</button>
                       </div>
                  </form>
            </section>

            <section class="articles-lists">
            </section>
        </main><br><br>

        <footer class="footer">
            <p class="footer-text">@copyright2024 - Les bonnes pièces : Digital Services</p>
        </footer>
    </body>
</html>
