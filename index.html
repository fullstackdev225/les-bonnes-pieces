<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les bonnes pièces - vente de pièces détachées auto</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="icons/logo-les-bonnes-pieces.png" type="image/x-icon">
    <script type="module" src="js/pieces.js"></script>
</head>
<body>
    <header class="header">
         <nav class="navbar">
            <a href="index.html" class="navbar-brand">
                <img src="icons/logo-les-bonnes-pieces.png" width="200" alt="logo du site">
            </a>

            <ul class="navbar-nav">
                <li class="nav-item"><a href="index.html" class="nav-link">Accueil</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Catalogue</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>
            </ul>
         </nav>
    </header><br><br>

    <main>
        <section class="section-filter">
              <h1>Filtre</h1>
              <div class="button-filter">
                <button id="piece-optique">Optique</button><br><br>
                <button id="piece-freinage">Freinage</button><br><br>
                <button id="prix-croissant">Prix croissant</button><br><br>
                <button id="prix-decroissant">Prix decroissant</button>
              </div><br><br>

              <h1>Ajouter un avis</h1>
              <form class="form">
                   <label for="piece-id">Identifiant de la pièce :</label><br>
                   <input type="number" name="piece-id" id="piece-id" required><br><br>

                   <label for="username">Nom d'utilisateur :</label><br>
                   <input type="text" name="username" id="username" required><br><br>

                   <label for="avis">Avis :</label><br>
                   <textarea name="avis" required id="avis" cols="30" rows="10"></textarea><br><br>

                   <button type="submit">Envoyer</button>
              </form>
        </section>

        <section class="articles-lists">
        </section>
    </main><br><br>

    <footer>
        <p>@copyright - Les bonnes pièces made by : <span>Digital services</span></p>
    </footer>
</body>
</html>
