<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Site web de vente de pieces automobile</title>
        <link rel="stylesheet" href="css/main.css">
        <link rel="shortcut icon" href="icons/logo-les-bonnes-pieces.png" type="image/x-icon">
        <script type="module" src="js/articles.js"></script>
    </head>

    <body>
        <header class="header">
            <div class="header__icon">
                <a href="index.html">
                   <img src="icons/logo-les-bonnes-pieces.png" alt="logo du site web" width="200">
                </a>
            </div>

            <nav class="navbar">
                <ul class="navbar__nav">
                    <li class="nav__item"><a href="index.html" class="nav__link">Accueil</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Catalogue</a></li>
                    <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
                </ul>
            </nav>
        </header><br><br>

        <main>
            <section class="filter">
                <h1 class="filter__title">Filtre</h1>
                <div class="filter__btn">
                    <p><a href="#" id="optiques">Optiques</a></p>
                    <p><a href="#" id="freinage">Freinage</a></p>
                    <p><a href="#" id="increase-price">Prix croissant</a></p>
                    <p><a href="#" id="decrease-price">Prix decroissant</a></p>
                </div><br><br>

                <h2 class="filter__title">Envoyer vos avis</h2>
                <form class="form">
                    <label for="piece-id" class="form__label">Identifiant de la piece :</label><br>
                    <input type="number" name="piece-id" id="piece-id" required class="form__input"><br><br>

                    <label for="username" class="form__label">Nom d'utilisateur :</label><br>
                    <input type="text" name="username" id="username" required class="form__input"><br><br>

                    <label for="opinion" class="form__label">Avis :</label><br>
                    <textarea name="opinion" id="opinion" required cols="30" rows="10" class="form__input"></textarea><br><br>

                    <button type="submit">Envoyer</button>
                </form>
            </section>

            <section class="articles-lists">
            </section>
        </main><br><br>

        <footer class="footer">
            <p class="footer__text">@copyright - Les bonnes pieces made by : <span>Novatech</span></p>
        </footer>
    </body>
</html>
