<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Les bonnes pièces - site web de vente d'articles</title>
        <link rel="stylesheet" href="css/main.css">
        <script type="module" src="js/articles.js"></script>
    </head>

    <body>
        <header class="header">
            <div class="header__icon">
                <a href="index.html"><img src="icons/logo-les-bonnes-pieces.png" width="200" alt="website's icon"></a>
            </div>

            <h1 class="header__title">Les bonnes pièces</h1>
        </header><br><br>

        <main>
            <section class="section-filter">
                 <h1>Filtre</h1>
                 <button class="btn" id="btn-filter1">Optiques</button><br><br>
                 <button class="btn" id="btn-filter2">Freinage</button><br><br>
                 <button class="btn" id="btn-sort1">Prix croissant</button><br><br>
                 <button class="btn" id="btn-sort2">Prix décroissant</button><br><br><br>

                 <label for="max-price">Prix maximum :</label><br>
                 <input type="range" name="max-price" id="max-price" step="0" min="0" max="60">
                 <br><br><br>

                 <h2>Envoyer vos avis</h2>
                 <form class="form">
                    <div class="form__section">
                        <label for="article-id" class="form__label">Identifiant de la pièce</label><br>
                        <input type="number" name="article-id" id="article-id" required class="form__input">
                    </div><br>

                    <div class="form__section">
                        <label for="username" class="form__label">Nom d'utilisateur</label><br>
                        <input type="text" name="username" id="username" required class="form__input">
                    </div><br>

                    <div class="form__section">
                        <label for="user-message" class="form__label">Message</label><br>
                         <textarea name="user-message" id="user-message" required cols="30" rows="10" class="form__input"></textarea>
                    </div><br>

                    <div class="form__section">
                        <button type="submit" class="btn">Envoyer</button>
                    </div>
                 </form>
            </section>

            <section class="section-articles">
            </section>
        </main><br><br>

        <footer class="footer">
            <p class="footer__text">@copyright2024 - Les bonnes pièces : <span>Digital Services</span></p>
        </footer>
    </body>
</html>
