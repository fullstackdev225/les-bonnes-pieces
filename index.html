<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <title>Les bonnes pièces - Site de vente de pièces</title>
        <link rel="stylesheet" href="css/style.css">
        <script type="module" src="js/pieces.js"></script>
    </head>

    <body>
        <header class="header">
            <div class="header-icon">
                <img src="icon/logo-les-bonnes-pieces.png" width="200" alt="website's icon">
            </div>
            
            <h1 class="header-title">Les bonnes pièces</h1>

            <div class="search-bar">
                <input type="search" name="article" id="article">
                <button id="search-button">Rechercher</button>
            </div>
        </header><br><br>

        <main>
            <section class="filter-sort">
                 <h1>Filtrer</h1>
                 <div class="filter">
                    <button id="optical-article">Optique</button><br><br>
                    <button id="braking-article">Freinage</button><br><br>
                    Prix inférieure à 40$ : <br>
                    <input type="range" name="low-price" id="low-price" min="0" max="39" step="3">
                 </div><br><br>

                 <h2>Trier</h2>
                 <div class="sort">
                    <button id="ascending-price">Prix croissant</button><br><br>
                    <button id="decreasing-price">Prix décroissant</button>
                 </div><br><br>

                 <h2>Envoyer vos avis</h2>
                 <form class="opinion-form">
                    <label for="article-id">Identifiant de la pièce</label><br>
                    <input type="number" name="article-id" id="article-id" required><br><br>

                    <label for="username">Nom d'utilisateur</label><br>
                    <input type="text" name="username" id="username" required><br><br>

                    <label for="user-opinion">Avis</label><br>
                    <textarea name="user-opinion" id="user-opinion" required cols="30" rows="10"></textarea><br><br>

                    <div class="button">
                        <button id="form-btn">Envoyer</button>
                    </div>
                 </form>
            </section>

            <section class="article-list">
                 
            </section>
        </main><br><br>

        <footer class="footer">
              <p>@Copyright2024 - Les bonnes pièces : Made by <a href="https://openclassrooms.com/fr/">Openclassrooms</a></p>
        </footer>
    </body>
</html>
