<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Les bonnes pièces - site web de vente de pièces autos</title>
        <link rel="shortcut icon" href="icons/logo-les-bonnes-pieces.png" type="image/x-icon">
        <link rel="stylesheet" href="css/style.css">
        <script type="module" src="js/articles.js"></script>
    </head>

    <body>
        <header class="header">
            <a href="index.html" class="header-icon">
                <img src="icons/logo-les-bonnes-pieces.png" width="250" alt="app's icon">
            </a>

            <nav class="navbar">
                <ul class="navbar-nav">
                    <li class="nav-item"><a href="index.html" class="nav-link active">Accueil</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Catalogue</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </header><br><br>

        <main>
            <section class="section-filter">
                <h1>Filtrer</h1>
                <div class="btn-filter">
                    <a href="#" id="btn-optique">Optiques</a><br><br>
                    <a href="#" id="btn-freinage">Freinage</a><br><br>
                    <a href="#" id="btn-prix-croissant">Prix croissant</a><br><br>
                    <a href="#" id="btn-prix-decroissant">Prix décroissant</a>
                </div><br><br>

                <h2>Envoyer vos avis</h2>
                <form>
                    <label for="piece-id">Identifiant de la pièce :</label><br>
                    <input type="number" name="piece-id" id="piece-id" required><br><br>

                    <label for="username">Nom d'utilisateur :</label><br>
                    <input type="text" name="username" id="username" required><br><br>

                    <label for="comment">Commentaires :</label><br>
                    <textarea name="comment" id="comment" required cols="30" rows="10"></textarea><br><br>

                    <button type="submit">Envoyer</button>
                </form>
            </section>

            <section class="section-articles">
            </section>
        </main><br><br>

        <footer class="footer">
            <p class="footer-text">copyright@2026 - Les bonnes pièces créer par : <span>Digital Services</span></p>
        </footer>
    </body>
</html>
